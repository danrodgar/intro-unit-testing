name: Tests

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests for examples
        run: |
          set -e
          for dir in \
            code/calculatorExample \
            code/PITExample \
            code/complexNumber \
            code/TDDExampleFactorial \
            code/MavenExamples/AppEx0 \
            code/MockitoATM \
            code/EasyMockExample \
            code/CucumberTestExample \
            code/SeleniumTestExample \
            code/PlaywrightExample
          do
            echo "=== $dir ==="
            (cd "$dir" && mvn -q test)
          done
